id: C-GO-003
description: Go code must be gofmt-clean
type: atomic
tags: [pre-commit]
scope: global
checks:
  - name: gofmt check
    command:
      run: "gofmt -l . 2>/dev/null | wc -l | tr -d ' '"
      exit_code: 0
      output_matches: "^0$"
    on_fail: fail
    skip_if:
      command_not_available: gofmt
