id: C-CT-001
description: Docker services must not bind ports to host
type: atomic
tags: [pre-commit]
scope:
  paths: ["**/docker-compose*.yml", "**/docker-compose*.yaml", "**/compose*.yml", "**/compose*.yaml"]
checks:
  - name: no host port binding
    no_regex_in_file:
      pattern: '"[0-9]+:[0-9]+"'
    on_fail: fail
