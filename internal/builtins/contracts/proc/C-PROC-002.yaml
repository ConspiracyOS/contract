id: C-PROC-002
description: PR description must reference a GitHub issue
type: atomic
tags: [pre-push]
scope:
  paths: [".github/PULL_REQUEST_TEMPLATE.md"]
checks:
  - name: PR template has issue section
    regex_in_file:
      pattern: "Closes #"
    on_fail: warn
    skip_if:
      path_not_exists: .github/PULL_REQUEST_TEMPLATE.md
